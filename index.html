<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Festival Jeunesse OUAGA - Édition 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a; /* fond profond mais qui n'affecte pas l'affiche */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Conteneur principal : l'affiche exacte sans déformation */
        .affiche-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        /* L'affiche elle-même : position relative pour la zone photo */
        .affiche {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #000; /* fallback */
            cursor: default;
        }

        /* L'image de fond : l'affiche originale (backoung_festival.jpg) */
        .affiche-image {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            user-select: none;
        }

        /* ZONE DE COLLAGE PHOTO - positionnée exactement sur "Collez votre photo ici" */
        /* Ajustement parfait pour que rien ne bouge, le design reste intact */
        .zone-photo {
            position: absolute;
            /* Positionnement précis pour calquer l'emplacement du cadre blanc sur l'affiche */
            top: 41.3%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56%;
            aspect-ratio: 1 / 1;
            background: rgba(250, 245, 225, 0.92); /* couleur claire similaire au cadre */
            border-radius: 28px;
            box-shadow: 0 0 0 3px #FFD966, 0 6px 14px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: background 0.1s ease, box-shadow 0.1s;
            backdrop-filter: blur(1px);
        }

        /* Quand une photo est ajoutée, le fond blanc disparaît pour laisser l'image */
        .zone-photo.photo-active {
            background: transparent !important;
            box-shadow: 0 0 0 3px #FBBF24, 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Texte d'instruction à l'intérieur */
        .instruction-texte {
            font-size: 0.9rem;
            font-weight: 800;
            color: #2c2b26;
            background: rgba(255, 248, 205, 0.95);
            padding: 8px 16px;
            border-radius: 60px;
            text-align: center;
            font-family: inherit;
            letter-spacing: 0.4px;
            backdrop-filter: blur(3px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            pointer-events: none;
        }

        /* L'image que l'utilisateur colle */
        .photo-utilisateur {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Bouton "Enregistrer mon affiche" style exact */
        .btn-enregistrer {
            background: linear-gradient(105deg, #FACC15, #F59E0B);
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 20px;
            margin-top: 28px;
            border-radius: 60px;
            color: #1e1a07;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-enregistrer:hover {
            background: linear-gradient(105deg, #FFD966, #FBBF24);
            transform: scale(1.01);
        }

        .btn-enregistrer:active {
            transform: scale(0.98);
        }

        /* Pas d'élément superflu — tout est propre */
        input[type="file"] {
            display: none;
        }

        /* Petit toast discret pour confirmation, n'altère pas l'affiche */
        .toast-message {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #0f172ad9;
            backdrop-filter: blur(12px);
            color: #FFE484;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
            white-space: nowrap;
            border: 1px solid #ffd96666;
        }

        @media (max-width: 550px) {
            .zone-photo {
                width: 54%;
                top: 41%;
            }
            .instruction-texte {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
            .btn-enregistrer {
                font-size: 1rem;
                padding: 12px 16px;
            }
        }

        @media (max-width: 450px) {
            .zone-photo {
                width: 52%;
                top: 40.8%;
            }
        }

        /* Aucun texte ou élément ne dépasse, tout reste fidèle à l'affiche originale */
        footer {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #94a3b8;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="affiche-container">
    <div class="affiche" id="affichePrincipale">
        <!-- L'image de fond est exactement backoung_festival.jpg (l'affiche avec tous les textes) -->
        <img src="backoung_festival.jpg" alt="Festival Jeunesse OUAGA 6e Édition" class="affiche-image" id="fondAffiche">
        
        <!-- Zone cliquable pour coller la photo (correspond au rectangle "Collez votre photo ici") -->
        <div class="zone-photo" id="zoneCollage">
            <div class="instruction-texte" id="texteInstruction">
                📸 Cliquez pour<br>coller votre photo
            </div>
            <img src="" alt="Ma photo" class="photo-utilisateur" id="imgUtilisateur">
        </div>
    </div>

    <button class="btn-enregistrer" id="boutonSauvegarde">
        ⬇️ ENREGISTRER MON AFFICHE ⬇️
    </button>
    <footer>Cliquez sur le cadre clair ➕ collez votre photo</footer>
</div>

<!-- Input file invisible pour choisir la photo -->
<input type="file" id="inputPhoto" accept="image/jpeg, image/png, image/webp">

<!-- Librairie html2canvas pour capturer l'affiche sans rien altérer -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    (function() {
        // ----- RÉFÉRENCES DOM -----
        const afficheEl = document.getElementById('affichePrincipale');
        const zonePhoto = document.getElementById('zoneCollage');
        const imgUser = document.getElementById('imgUtilisateur');
        const instructionText = document.getElementById('texteInstruction');
        const fileInput = document.getElementById('inputPhoto');
        const saveBtn = document.getElementById('boutonSauvegarde');
        
        // État
        let photoCollee = false;
        
        // Fonction pour afficher une notification discrète (n'altère en rien l'affiche)
        function notification(message, duration = 1600) {
            let toast = document.querySelector('.toast-message');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-message';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) scale(1)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) scale(0.9)';
            }, duration);
        }
        
        // Gestion du clic sur la zone photo: ouverture du sélecteur de fichier
        zonePhoto.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        
        // Lorsque l'utilisateur sélectionne une photo
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            // Vérifier le type
            if (!file.type.startsWith('image/')) {
                notification("❌ Veuillez sélectionner une image (JPG, PNG)", 1500);
                return;
            }
            
            // Limite de taille raisonnable (8 Mo)
            if (file.size > 8 * 1024 * 1024) {
                notification("📸 Image trop lourde (max 8 Mo)", 1700);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const imageDataURL = e.target.result;
                // Appliquer l'image dans la zone
                imgUser.src = imageDataURL;
                imgUser.style.display = 'block';          // l'image apparaît
                instructionText.style.display = 'none';   // le texte "Cliquez pour coller" disparaît
                zonePhoto.classList.add('photo-active');   // fond devient transparent + bordure dorée
                photoCollee = true;
                notification("✅ Photo collée sur l'affiche !", 1500);
            };
            reader.onerror = () => {
                notification("Erreur lors du chargement", 1200);
            };
            reader.readAsDataURL(file);
            
            // Réinitialiser l'input pour permettre de changer de photo plus tard
            fileInput.value = '';
        });
        
        // Gestion de l'image de fond si jamais "backoung_festival.jpg" est manquante (sécurité)
        const fondImage = document.getElementById('fondAffiche');
        fondImage.onerror = () => {
            // On ne veut rien changer à l'expérience utilisateur, mais on affiche une image de secours
            // qui imite l'affiche originale pour que l'outil reste fonctionnel
            console.warn("backoung_festival.jpg introuvable — fond de secours");
            fondImage.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 450 630'%3E%3Crect width='450' height='630' fill='%231e1a2f'/%3E%3Ctext x='50%25' y='18%25' font-size='22' fill='%23FFD966' text-anchor='middle' font-weight='bold'%3EFestival Jeunesse%3C/text%3E%3Ctext x='50%25' y='28%25' font-size='28' fill='white' text-anchor='middle'%3EOUAGA%3C/text%3E%3Ctext x='50%25' y='37%25' font-size='16' fill='%23FFD966' text-anchor='middle'%3E6ᵉ Édition%3C/text%3E%3Crect x='30%25' y='44%25' width='40%25' height='18%25' fill='%23f5efdf' rx='12'/%3E%3Ctext x='50%25' y='53%25' font-size='11' fill='%23333333' text-anchor='middle'%3ECollez votre photo ici%3C/text%3E%3Ctext x='50%25' y='68%25' font-size='12' fill='%23cccccc' text-anchor='middle'%3E11 %26 12 Avril 2026 - SIAO%3C/text%3E%3C/svg%3E";
            notification("💡 Placez 'backoung_festival.jpg' dans le dossier", 2800);
        };
        
        // Fonction d'enregistrement de l'affiche (sans rien modifier à l'affichage)
        saveBtn.addEventListener('click', () => {
            // Petit retour utilisateur sur le bouton
            saveBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { saveBtn.style.transform = ''; }, 150);
            
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = "⏳ GÉNÉRATION EN COURS...";
            saveBtn.disabled = true;
            
            // Capturer l'élément affichePrincipale avec html2canvas
            html2canvas(afficheEl, {
                scale: 3,                // Haute qualité
                backgroundColor: null,
                useCORS: false,
                logging: false,
                allowTaint: false,
                imageTimeout: 0,
            }).then(canvas => {
                // Créer un lien de téléchargement
                const link = document.createElement('a');
                const imageData = canvas.toDataURL('image/png');
                link.href = imageData;
                link.download = 'affiche_festival_ouaga.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Restaurer le bouton
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
                notification("🎉 Affiche téléchargée avec succès ! 🎉", 2000);
            }).catch(err => {
                console.error("Erreur html2canvas :", err);
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
                notification("⚠️ Erreur technique, réessayez", 2000);
            });
        });
        
        // S'assurer que la zone photo reste cliquable et que rien ne bouge dans l'apparence.
        // Aucun texte ne s'ajoute, aucune couleur ne change en dehors de la zone de collage.
        // La page s'affiche exactement comme l'image originale avec le cadre blanc prêt à recevoir la photo.
        
        // Vérification que html2canvas est bien chargé
        if (typeof html2canvas === 'undefined') {
            console.error("html2canvas non chargé");
            saveBtn.addEventListener('click', () => {
                alert("Problème de connexion, rechargez la page.");
            });
        }
        
        // Petit message en console (pour info dev)
        console.log("✅ Affiche Festival Jeunesse prête — cliquez sur le cadre blanc pour coller votre photo");
    })();
</script>

<!-- Pas d'éléments intrusifs, tout est exactement comme l'affiche d'origine -->
</body>
  </html>
