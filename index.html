<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Festival Jeunesse OUAGA – Crée ton affiche</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            border-radius: 2rem;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            padding: 0.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .poster {
            position: relative;
            width: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 12px 28px black;
            background: #1e1b2a;
        }

        .poster-bg {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            user-select: none;
        }

        /* ZONE PHOTO AJUSTÉE : Plus basse et plus petite pour libérer "J'y serai !" */
        .photo-slot {
            position: absolute;
            top: 41.5%; /* Descendu pour libérer le haut */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 38%; /* Réduit pour ne pas déborder */
            aspect-ratio: 1 / 1;
            background: rgba(250, 245, 225, 0.95);
            border-radius: 20px;
            box-shadow: 0 0 0 3px #FFD966, 0 6px 12px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .photo-slot.has-photo {
            background: transparent !important;
            box-shadow: 0 0 0 3px #FBBF24, 0 8px 18px rgba(0,0,0,0.4);
        }

        .slot-placeholder {
            font-size: 0.75rem;
            font-weight: 800;
            color: #2b2719;
            text-align: center;
            padding: 5px;
        }

        .user-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .save-btn {
            background: linear-gradient(105deg, #FACC15, #F59E0B);
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 14px;
            margin-top: 20px;
            border-radius: 50px;
            color: #1f1b08;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        input[type="file"] {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        /* Ajustements mobiles fins */
        @media (max-width: 480px) {
            .photo-slot {
                width: 38%;
                top: 41.2%;
                border-radius: 15px;
            }
            .slot-placeholder {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="poster" id="posterContainer">
        <img src="background_festival.jpg" alt="Affiche" class="poster-bg" id="bgFestival">
        
        <div class="photo-slot" id="photoZone">
            <div class="slot-placeholder" id="placeholderTxt">
                📸 Cliquez ici
            </div>
            <img src="" alt="Ma photo" class="user-photo" id="userPhotoImg">
        </div>
    </div>

    <button class="save-btn" id="savePosterBtn">
        ⬇️ ENREGISTRER MON AFFICHE ⬇️
    </button>
    <footer>Format carré recommandé pour un meilleur rendu</footer>
</div>

<input type="file" id="photoInput" accept="image/*">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    const photoSlot = document.getElementById('photoZone');
    const userImg = document.getElementById('userPhotoImg');
    const placeholderSpan = document.getElementById('placeholderTxt');
    const fileInput = document.getElementById('photoInput');
    const saveBtn = document.getElementById('savePosterBtn');
    const poster = document.getElementById('posterContainer');

    photoSlot.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                userImg.src = event.target.result;
                userImg.style.display = 'block';
                placeholderSpan.style.display = 'none';
                photoSlot.classList.add('has-photo');
            };
            reader.readAsDataURL(file);
        }
    });

    saveBtn.addEventListener('click', () => {
        saveBtn.innerText = "⏳ GÉNÉRATION...";
        html2canvas(poster, { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'mon_affiche_festival.png';
            link.click();
            saveBtn.innerHTML = "⬇️ ENREGISTRER MON AFFICHE ⬇️";
        });
    });
</script>
</body>
          </html>
