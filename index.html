<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival de la Jeunesse OUAGA - Mon Affiche</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        .poster-container {
            width: 375px; 
            height: 667px; 
            position: relative;
            background-image: url('background_festival.jpg'); 
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logos-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 15px;
            height: 40px;
        }

        .festival-title {
            color: #d81b60; 
            font-weight: 900;
            font-size: 24px;
            text-align: center;
            margin-bottom: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }
        
        .ouaga-title {
            color: #1976d2; 
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .edition-badge {
            border: 2px solid white;
            border-radius: 5px;
            padding: 3px 12px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        .claim-text {
            color: #1976d2;
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 15px;
        }

        /* CADRE PHOTO */
        .photo-frame-wrapper {
            width: 240px;
            height: 240px;
            position: relative;
            cursor: pointer;
            margin-bottom: 10px; /* Réduit pour laisser de la place en bas */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gold-ornament {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: url('ornementation_cadre.png'); 
            background-size: cover;
            z-index: 2;
        }

        .inner-frame {
            position: absolute;
            width: 190px; height: 190px;
            border: 4px solid gold;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .inner-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-text {
            color: white;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
        }

        /* SECTION DETAILS - DÉPLACÉE VERS LE BAS */
        .details-section {
            width: 100%;
            text-align: center;
            margin-top: 10px; /* Crée l'espace sous la photo */
        }

        .date-loc {
            color: #d81b60; 
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .contact-phones {
            font-size: 13px;
            margin-bottom: 5px;
            color: white;
            line-height: 1.4;
        }

        .organizer {
            font-size: 11px;
            color: #ccc;
            margin-top: 5px;
        }

        /* BOUTON */
        #btnSave {
            margin-top: auto; /* Pousse le bouton tout en bas du conteneur */
            background-color: #2e7d32;
            color: white;
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: transform 0.1s;
        }
        #btnSave:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="poster-container" id="poster">
        <div class="logos-header">
            </div>

        <div class="festival-title">Festival de la Jeunesse</div>
        <div class="ouaga-title">OUAGA</div>
        <div class="edition-badge">6ème Edition</div>
        
        <div class="claim-text">J'y serai !</div>

        <div class="photo-frame-wrapper" id="photoFrame">
            <div class="gold-ornament"></div>
            <div class="inner-frame">
                <img src="" alt="Photo utilisateur" id="userPhoto">
                <span class="placeholder-text">Cliquez ici pour<br>votre photo</span>
            </div>
        </div>

        <div class="details-section">
            <div class="date-loc">11 & 12 Avril 2026 @ SIAO</div>
            <div class="contact-phones">
                <span>+226 78 65 97 77</span> | <span>+226 58 29 99 37</span>
            </div>
            <div class="organizer">Un événement Bosslife Communication</div>
        </div>

        <button id="btnSave">Enregistrer mon affiche</button>
    </div>

    <input type="file" id="photoInput" accept="image/*" style="display: none;">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const photoFrame = document.getElementById('photoFrame');
        const photoInput = document.getElementById('photoInput');
        const userPhoto = document.getElementById('userPhoto');
        const placeholderText = document.querySelector('.placeholder-text');
        const btnSave = document.getElementById('btnSave');

        photoFrame.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhoto.src = e.target.result;
                    userPhoto.style.display = 'block';
                    placeholderText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        btnSave.addEventListener('click', () => {
            const poster = document.getElementById('poster');
            // On cache le bouton pendant la capture pour qu'il n'apparaisse pas sur l'image finale
            btnSave.style.display = 'none';
            
            html2canvas(poster, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = 'mon_affiche_festival.png';
                link.click();
                btnSave.style.display = 'block'; // On réaffiche le bouton
            });
        });
    </script>
</body>
  </html>
