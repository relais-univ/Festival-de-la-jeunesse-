<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Affiche Officiel - Festival</title>
    <style>
        /* Styles de base pour centrer l'affiche à l'écran */
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; background-color: #0d1117; /* Fond sombre pour le site */
            font-family: sans-serif;
        }

        /* --- LE CONTENEUR DE L'AFFICHE --- */
        .poster-container {
            width: 375px; /* Largeur standard mobile */
            height: 667px; /* Hauteur standard mobile */
            position: relative;
            background-image: url('votre_affiche_fond.jpg'); /* TON IMAGE DE FOND ICI */
            background-size: 100% 100%; /* Force l'image à remplir tout le conteneur */
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden; /* Empêche tout débordement de la photo */
            border-radius: 12px;
        }

        /* --- LA ZONE PHOTO DE PRÉCISION --- */
        /* C'est ici que l'on calibre le placement exact dans le cadre doré */
        .photo-insert-zone {
            position: absolute;
            
            /* Calibrage vertical : Ajuste ce chiffre pour descendre/monter */
            top: 298px; 
            
            /* Centrage horizontal parfait */
            left: 50%;
            transform: translateX(-50%);
            
            /* Dimensions exactes de l'espace BLANC à l'intérieur du cadre doré */
            /* Ajuste ces valeurs si la photo est trop grande/petite pour le cadre */
            width: 172px;  
            height: 172px; 
            
            cursor: pointer;
            overflow: hidden; /* Coupe la photo si elle est plus grande que la zone */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255,255,255,0.1); /* Légère teinte pour indiquer la zone avant l'ajout */
            z-index: 10; /* S'assure d'être au-dessus du fond pour le clic */
        }

        /* --- LA PHOTO DE L'UTILISATEUR --- */
        .photo-insert-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit la zone sans déformer, en coupant si nécessaire */
            display: none; /* Cachée par défaut */
        }

        /* Texte d'instruction discret */
        .instruction-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            pointer-events: none; /* Ne gêne pas le clic */
        }

        /* --- LE BOUTON D'ENREGISTREMENT --- */
        #btnSave {
            margin-top: 25px;
            background-color: #2e7d32; /* Vert */
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        #btnSave:hover { background-color: #1b5e20; }
        #btnSave:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="poster-container" id="poster">
        
        <div class="photo-insert-zone" id="photoZone">
            <img src="" alt="Ma Photo" id="userPhoto">
            <span class="instruction-text">Cliquez ici pour<br>votre photo</span>
        </div>
        
        </div>

    <button id="btnSave">Enregistrer mon affiche</button>

    <input type="file" id="photoInput" accept="image/*" style="display: none;">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        const photoZone = document.getElementById('photoZone');
        const photoInput = document.getElementById('photoInput');
        const userPhoto = document.getElementById('userPhoto');
        const instructionText = document.querySelector('.instruction-text');
        const btnSave = document.getElementById('btnSave');

        // 1. Clic sur la zone -> ouvre le sélecteur
        photoZone.addEventListener('click', () => {
            photoInput.click();
        });

        // 2. Gestion de la photo sélectionnée
        photoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhoto.src = e.target.result;
                    userPhoto.style.display = 'block'; // Affiche l'image
                    instructionText.style.display = 'none'; // Cache le texte
                };
                reader.readAsDataURL(file);
            }
        });

        // 3. Capture et téléchargement
        btnSave.addEventListener('click', () => {
            const poster = document.getElementById('poster');
            
            // Pour une capture propre, on enlève temporairement l'ombre portée du conteneur
            poster.style.boxShadow = "none";
            
            html2canvas(poster, { 
                scale: 3, // Haute résolution (x3) pour l'impression/partage
                useCORS: true, // Pour gérer les images externes si besoin
                logging: false // Désactive les logs dans la console
            }).then(canvas => {
                // Rétablit l'ombre après la capture
                poster.style.boxShadow = "0 10px 30px rgba(0,0,0,0.8)";
                
                // Création du lien de téléchargement
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = 'mon_affiche_festival_jeunesse.png';
                link.click();
            });
        });
    </script>
</body>
</html>
