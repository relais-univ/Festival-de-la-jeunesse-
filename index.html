<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Festival Jeunesse OUAGA – Crée ton affiche</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Conteneur principal – comme une carte élégante */
        .card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            border-radius: 2rem;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            padding: 0.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        /* L'affiche : image de fond exacte (background_festival.jpg) */
        .poster {
            position: relative;
            width: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 12px 28px black;
            background: #1e1b2a;
            cursor: default;
        }

        /* Image de fond (l'affiche officielle) */
        .poster-bg {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            user-select: none;
        }

        /* ZONE PHOTO REDIMENSIONNÉE + POSITION PRO (plus petite, ne cache AUCUNE écriture) */
        .photo-slot {
            position: absolute;
            /* Valeurs fines pour que le cadre tombe pile sur "Collez votre photo ici" 
               sans masquer le titre, les dates, ni les infos contact */
            top: 38.5%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 42%;           /* taille réduite pour ne pas cacher les textes */
            aspect-ratio: 1 / 1;
            background: rgba(250, 245, 225, 0.92);
            border-radius: 24px;
            box-shadow: 0 0 0 3px #FFD966, 0 6px 12px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(1px);
        }

        /* Lorsque la photo est ajoutée, fond transparent */
        .photo-slot.has-photo {
            background: transparent !important;
            box-shadow: 0 0 0 3px #FBBF24, 0 8px 18px rgba(0,0,0,0.35);
        }

        /* Texte d'instruction + icône */
        .slot-placeholder {
            font-size: 0.85rem;
            font-weight: 800;
            color: #2b2719;
            background: rgba(255, 250, 215, 0.95);
            padding: 6px 14px;
            border-radius: 60px;
            text-align: center;
            font-family: inherit;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            pointer-events: none;
            white-space: nowrap;
        }

        /* l'image utilisateur */
        .user-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Bouton d'enregistrement professionnel */
        .save-btn {
            background: linear-gradient(105deg, #FACC15, #F59E0B);
            border: none;
            font-weight: bold;
            font-size: 1.18rem;
            padding: 14px 18px;
            margin-top: 28px;
            border-radius: 60px;
            color: #1f1b08;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .save-btn:hover {
            background: linear-gradient(105deg, #FFD966, #FBBF24);
            transform: scale(1.01);
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        /* input file caché */
        input[type="file"] {
            display: none;
        }

        /* toast discret */
        .toast-msg {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #0f172ae6;
            backdrop-filter: blur(12px);
            color: #FFE484;
            padding: 8px 22px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
            white-space: nowrap;
            border: 1px solid #ffd96666;
        }

        /* responsive : la zone photo reste proportionnée */
        @media (max-width: 550px) {
            .photo-slot {
                width: 40%;
                top: 38%;
            }
            .slot-placeholder {
                font-size: 0.7rem;
                padding: 4px 10px;
                white-space: nowrap;
            }
            .save-btn {
                font-size: 1rem;
                padding: 12px 14px;
            }
        }

        @media (max-width: 450px) {
            .photo-slot {
                width: 42%;
                top: 37.8%;
            }
            .slot-placeholder {
                font-size: 0.65rem;
                padding: 4px 8px;
            }
        }

        footer {
            text-align: center;
            margin-top: 14px;
            font-size: 0.7rem;
            color: #94a3b8;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="poster" id="posterContainer">
        <!-- L'image de fond : background_festival.jpg (l'affiche avec tous les textes) -->
        <img src="background_festival.jpg" alt="Festival Jeunesse OUAGA 6e Édition" class="poster-bg" id="bgFestival">
        
        <!-- Zone cliquable pour coller la photo – taille réduite et bien ajustée -->
        <div class="photo-slot" id="photoZone">
            <div class="slot-placeholder" id="placeholderTxt">
                📸 Cliquez
            </div>
            <img src="" alt="Ma photo" class="user-photo" id="userPhotoImg">
        </div>
    </div>

    <button class="save-btn" id="savePosterBtn">
        ⬇️ ENREGISTRER MON AFFICHE ⬇️
    </button>
    <footer>Cliquez sur le cadre doré ➕ collez votre photo (format carré recommandé)</footer>
</div>

<input type="file" id="photoInput" accept="image/jpeg, image/png, image/webp">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    (function() {
        // RÉFÉRENCES
        const poster = document.getElementById('posterContainer');
        const photoSlot = document.getElementById('photoZone');
        const userImg = document.getElementById('userPhotoImg');
        const placeholderSpan = document.getElementById('placeholderTxt');
        const fileInput = document.getElementById('photoInput');
        const saveBtn = document.getElementById('savePosterBtn');
        
        // Fonction notification discrète
        function showMessage(msg, duration = 1600) {
            let toast = document.querySelector('.toast-msg');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-msg';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) scale(1)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) scale(0.9)';
            }, duration);
        }
        
        // Clic sur la zone = importer la photo
        photoSlot.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        
        // Traitement de l'image choisie
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showMessage("❌ Sélectionnez une image (JPG, PNG)", 1500);
                return;
            }
            
            if (file.size > 8 * 1024 * 1024) {
                showMessage("📸 Image trop lourde (max 8 Mo)", 1700);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgData = e.target.result;
                userImg.src = imgData;
                userImg.style.display = 'block';
                placeholderSpan.style.display = 'none';
                photoSlot.classList.add('has-photo');
                showMessage("✅ Photo collée sur l'affiche !", 1500);
            };
            reader.onerror = () => {
                showMessage("Erreur de lecture", 1200);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        });
        
        // Gestion du fond d'affiche (sécurité)
        const bgImg = document.getElementById('bgFestival');
        bgImg.onerror = () => {
            console.warn("background_festival.jpg introuvable — vérifiez le nom du fichier");
            showMessage("⚠️ Image 'background_festival.jpg' manquante", 2500);
            // fallback élégant mais discret
            bgImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 450 630'%3E%3Crect width='450' height='630' fill='%231e1a2f'/%3E%3Ctext x='50%25' y='20%25' font-size='22' fill='%23FFD966' text-anchor='middle' font-weight='bold'%3EFestival Jeunesse%3C/text%3E%3Ctext x='50%25' y='32%25' font-size='28' fill='white' text-anchor='middle'%3EOUAGA%3C/text%3E%3Ctext x='50%25' y='42%25' font-size='16' fill='%23FFD966' text-anchor='middle'%3E6ᵉ Édition%3C/text%3E%3Crect x='32%25' y='47%25' width='36%25' height='12%25' fill='%23f5efdf' rx='12'/%3E%3Ctext x='50%25' y='54.5%25' font-size='10' fill='%23333333' text-anchor='middle'%3ECollez votre photo%3C/text%3E%3Ctext x='50%25' y='70%25' font-size='12' fill='%23cccccc' text-anchor='middle'%3E11 %26 12 Avril 2026 - SIAO%3C/text%3E%3C/svg%3E";
        };
        
        // Enregistrement : capture de l'affiche avec la photo collée
        saveBtn.addEventListener('click', () => {
            // petite animation
            saveBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { saveBtn.style.transform = ''; }, 150);
            
            const originalBtnHtml = saveBtn.innerHTML;
            saveBtn.innerHTML = "⏳ GÉNÉRATION EN COURS...";
            saveBtn.disabled = true;
            
            html2canvas(poster, {
                scale: 3,
                backgroundColor: null,
                useCORS: false,
                logging: false,
                allowTaint: false,
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'affiche_festival_ouaga.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                saveBtn.innerHTML = originalBtnHtml;
                saveBtn.disabled = false;
                showMessage("🎉 Affiche téléchargée !", 2000);
            }).catch(err => {
                console.error("html2canvas error", err);
                saveBtn.innerHTML = originalBtnHtml;
                saveBtn.disabled = false;
                showMessage("⚠️ Erreur, réessayez", 2000);
            });
        });
        
        console.log("✅ Affiche prête – zone photo réduite, aucun texte caché. Fichier attendu: background_festival.jpg");
    })();
</script>
</body>
  </html>
