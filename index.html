<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Affiche - Festival de la Jeunesse</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; background-color: #1a1a1a;
            color: white;
        }

        /* L'AFFICHE (On utilise l'image comme seul décor) */
        .poster-container {
            width: 375px; 
            height: 667px; 
            position: relative;
            background-image: url('votre_affiche_fond.jpg'); /* TON IMAGE ICI */
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* ZONE PHOTO INVISIBLE (Positionnée sur le cadre doré) */
        .photo-zone {
            position: absolute;
            top: 302px; /* Ajuste cette valeur pour centrer dans le cadre doré */
            left: 50%;
            transform: translateX(-50%);
            width: 172px;  /* Largeur intérieure du cadre */
            height: 172px; /* Hauteur intérieure du cadre */
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .photo-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .instruction-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* BOUTON D'ENREGISTREMENT */
        #btnSave {
            margin-top: 25px;
            background-color: #2e7d32;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        #btnSave:hover { background-color: #1b5e20; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="poster-container" id="poster">
        <div class="photo-zone" id="photoZone">
            <img src="" alt="Photo" id="userPhoto">
            <span class="instruction-text">Cliquez pour<br>votre photo</span>
        </div>
    </div>

    <button id="btnSave">Enregistrer mon affiche</button>

    <input type="file" id="photoInput" accept="image/*" style="display: none;">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const photoZone = document.getElementById('photoZone');
        const photoInput = document.getElementById('photoInput');
        const userPhoto = document.getElementById('userPhoto');
        const btnSave = document.getElementById('btnSave');

        photoZone.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhoto.src = e.target.result;
                    userPhoto.style.display = 'block';
                    document.querySelector('.instruction-text').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        btnSave.addEventListener('click', () => {
            // Désactiver temporairement l'ombre pour une capture propre
            const poster = document.getElementById('poster');
            poster.style.boxShadow = "none";

            html2canvas(poster, { 
                scale: 3, 
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = 'mon_affiche_festival_2026.png';
                link.click();
                poster.style.boxShadow = "0 10px 30px rgba(0,0,0,0.8)";
            });
        });
    </script>
</body>
</html>
