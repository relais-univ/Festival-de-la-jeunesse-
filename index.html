<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Festival Jeunesse OUAGA - Ma Photo sur l'Affiche</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* éviter les sélections intempestives sur mobile */
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Carte principale qui contient l'affiche */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,215,0,0.2);
        }

        /* L'AFFICHE : fond image exacte (backoung_festival.jpg) */
        .poster {
            position: relative;
            width: 100%;
            max-width: 450px;    /* Largeur confortable, l'image garde ses proportions */
            margin: 0 auto;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px black;
            background-color: #000; /* fallback */
            cursor: pointer;
        }

        /* L'image de fond (l'affiche officielle sans la photo) */
        .poster-background {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;  /* pour que le clic aille sur la zone photo */
            user-select: none;
        }

        /* Zone blanche / cadre où l'utilisateur colle sa photo */
        .photo-slot {
            position: absolute;
            /* Ces valeurs sont ajustées pour que la zone tombe pile sur le rectangle blanc/clair 
               de l'affiche fournie. D'après l'aperçu du fichier texte, le cadre "Collez votre photo ici"
               se trouve au centre, sous le titre. J'ai calé les dimensions */
            top: 40%;           /* à ajuster finement, mais on utilisera des unités relatives */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55%;         /* largeur relative à l'affiche */
            aspect-ratio: 1 / 1; /* carré comme la zone photo */
            background: rgba(245, 240, 220, 0.85); /* léger rappel blanc cassé */
            border-radius: 20px;
            box-shadow: 0 0 0 3px #FFD966, 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        /* Quand la photo est présente, on enlève le background blanc */
        .photo-slot.has-photo {
            background: transparent !important;
            box-shadow: 0 0 0 3px #FFB347, 0 8px 18px black;
        }

        /* Style du texte d'instruction */
        .placeholder-text {
            font-size: 1rem;
            font-weight: bold;
            color: #2c2b26;
            background: rgba(255,248,205,0.9);
            padding: 8px 12px;
            border-radius: 40px;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            pointer-events: none;
        }

        /* L'image ajoutée par l'utilisateur */
        .user-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s;
        }

        /* Bouton enregistrement stylé */
        .btn-save {
            background: linear-gradient(95deg, #EAB308, #F59E0B);
            border: none;
            font-size: 1.25rem;
            font-weight: bold;
            padding: 12px 28px;
            margin-top: 28px;
            border-radius: 60px;
            color: #1e1b0b;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save:hover {
            background: linear-gradient(95deg, #FACC15, #FBBF24);
            transform: scale(1.02);
            box-shadow: 0 10px 22px black;
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        /* petit message de confirmation */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1f2937e6;
            backdrop-filter: blur(10px);
            color: #FFE484;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 200;
            font-family: monospace;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* adaptation mobile : la zone photo reste bien centrée */
        @media (max-width: 550px) {
            .photo-slot {
                width: 52%;
            }
            .placeholder-text {
                font-size: 0.8rem;
                padding: 5px 10px;
            }
            .btn-save {
                font-size: 1rem;
                padding: 10px 20px;
            }
        }

        /* cache input file */
        input[type="file"] {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.7rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div>
    <div class="card">
        <div class="poster" id="posterElement">
            <!-- IMAGE DE FOND = L'AFFICHE OFFICIELLE (backoung_festival.jpg) -->
            <img src="backoung_festival.jpg" alt="Festival Jeunesse OUAGA 6e Édition" class="poster-background" id="bgImage">
            
            <!-- ZONE DE COLLAGE PHOTO (rond/carré blanc) -->
            <div class="photo-slot" id="photoSlot">
                <div class="placeholder-text" id="placeholderText">
                    📸 Cliquez pour<br>coller votre photo
                </div>
                <img src="" alt="Ma photo" class="user-img" id="userPhotoImg" style="display: none;">
            </div>
        </div>

        <button class="btn-save" id="savePosterBtn">
            ⬇️ ENREGISTRER MON AFFICHE ⬇️
        </button>
        <footer>Cliquez sur la zone claire ➕ collez votre photo</footer>
    </div>
    <div id="toastMessage" class="toast-msg">✨ Affiche prête ! ✨</div>
</div>

<!-- Hidden file input -->
<input type="file" id="photoFileInput" accept="image/jpeg, image/png, image/webp">

<!-- html2canvas pour la capture -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    (function() {
        // -------- RÉFÉRENCES DOM ----------
        const posterContainer = document.getElementById('posterElement');   // conteneur principal affiche
        const photoSlot = document.getElementById('photoSlot');            // zone cliquable
        const userImg = document.getElementById('userPhotoImg');           // l'élément img qui affichera la photo collée
        const placeholder = document.getElementById('placeholderText');    // texte instruction
        const fileInput = document.getElementById('photoFileInput');
        const saveBtn = document.getElementById('savePosterBtn');
        const toastMsg = document.getElementById('toastMessage');

        // Variable pour suivre si une photo a été chargée
        let hasPhoto = false;
        let currentPhotoDataURL = null;

        // ---------- FONCTION POUR AFFICHER UN PETIT MESSAGE TEMPORAIRE ----------
        function showToast(message, duration = 1800) {
            if (!toastMsg) return;
            toastMsg.textContent = message || "✅ Photo collée !";
            toastMsg.style.opacity = '1';
            toastMsg.style.transform = 'translateX(-50%) scale(1)';
            setTimeout(() => {
                toastMsg.style.opacity = '0';
                toastMsg.style.transform = 'translateX(-50%) scale(0.9)';
            }, duration);
        }

        // ---------- GESTION DU CLIC SUR LA ZONE PHOTO (coller sa photo) ----------
        photoSlot.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();   // déclenche l'upload
        });

        // Lecture du fichier image choisi par l'utilisateur
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Vérifier que c'est une image
            if (!file.type.startsWith('image/')) {
                showToast("❌ Veuillez sélectionner une image", 1500);
                return;
            }

            // Limiter taille (optionnel, mais pour éviter crash)
            if (file.size > 8 * 1024 * 1024) {
                showToast("📸 Image trop lourde (max 8 Mo)", 1700);
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const imgDataURL = e.target.result;
                currentPhotoDataURL = imgDataURL;
                // Afficher l'image dans la zone
                userImg.src = imgDataURL;
                userImg.style.display = 'block';
                placeholder.style.display = 'none';      // cacher le texte "cliquez pour coller"
                photoSlot.classList.add('has-photo');     // ajoute une classe pour enlever le fond blanc
                hasPhoto = true;
                showToast("📷 Photo collée sur l'affiche !", 1500);
            };
            reader.onerror = () => {
                showToast("Erreur de lecture", 1200);
            };
            reader.readAsDataURL(file);
            
            // reset input pour permettre de re-sélectionner le même fichier si besoin
            fileInput.value = '';
        });

        // ---------- FONCTION POUR GÉRER LE CAS D'UNE IMAGE DE FOND MANQUANTE ----------
        // Sécurité : si jamais backoung_festival.jpg ne se charge pas, on affiche un fond de secours
        const bgImg = document.getElementById('bgImage');
        bgImg.onerror = () => {
            console.warn("Image de fond backoung_festival.jpg introuvable, mais on utilise un fond coloré");
            bgImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 450 630'%3E%3Crect width='450' height='630' fill='%231e1b2f'/%3E%3Ctext x='50%25' y='40%25' font-size='20' fill='%23ffcc44' text-anchor='middle' font-family='monospace'%3EFestival Jeunesse%3C/text%3E%3C/svg%3E";
            // On garde l'apparence cohérente, mais l'utilisateur sait qu'il faut backoung_festival.jpg
            showToast("Info: placez backoung_festival.jpg dans le même dossier", 2000);
        };

        // ---------- ENREGISTREMENT DE L'AFFICHE COMPLÈTE AVEC LA PHOTO COLLÉE ----------
        saveBtn.addEventListener('click', () => {
            // Petite animation de feedback
            saveBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { saveBtn.style.transform = ''; }, 150);

            // On vérifie que la zone photo a bien l'image et on utilise html2canvas
            // Pour un rendu parfait, on s'assure que l'image de fond est bien chargée
            // On utilise le conteneur posterElement (qui contient le fond et la zone)
            // Important : html2canvas prend en compte les images cross-origin, mais nos images sont locales ou dataURL
            const targetNode = posterContainer;
            
            // On affiche un petit message "Génération..."
            const originalBtnText = saveBtn.innerHTML;
            saveBtn.innerHTML = "⏳ GÉNÉRATION EN COURS...";
            saveBtn.disabled = true;
            
            // Utiliser html2canvas avec une échelle élevée pour une qualité optimale
            html2canvas(targetNode, {
                scale: 3,               // haute résolution
                backgroundColor: null,  // fond transparent (mais l'image de fond s'imprime)
                useCORS: true,          // si jamais on avait des url externes (pas le cas)
                logging: false,
                allowTaint: false,
                imageTimeout: 0,
            }).then(canvas => {
                // Créer un lien de téléchargement
                const link = document.createElement('a');
                // Transformer le canvas en PNG haute qualité
                const imageData = canvas.toDataURL('image/png');
                link.href = imageData;
                link.download = 'mon_affiche_festival_ouaga.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Restaurer le bouton
                saveBtn.innerHTML = originalBtnText;
                saveBtn.disabled = false;
                showToast("🎉 Affiche téléchargée ! 🎉", 2000);
            }).catch(error => {
                console.error("Erreur html2canvas :", error);
                saveBtn.innerHTML = originalBtnText;
                saveBtn.disabled = false;
                showToast("⚠️ Erreur lors de la capture, réessayez", 2000);
            });
        });

        // OPTIONNEL : si l'utilisateur veut changer de photo, il peut recliquer sur la zone
        // déjà géré : la zone cliquable recharge l'input et remplace la photo.
        // On ajoute une fonction pour remplacer: en recliquant, l'ancienne photo est remplacée.
        // Pour une meilleure expérience, si on clique à nouveau, on écrase l'ancienne.
        // Déjà fonctionnel grâce à fileInput change qui met à jour userImg et cache placeholder.
        
        // Petit plus: si la photo existe et que l'utilisateur veut l'enlever? 
        // Pas demandé dans le brief, mais on peut ajouter un double-clic ou menu contextuel? Pas nécessaire.
        // On garantit que "coller votre photo" signifie juste cliquer dans la zone blanche.
        
        // Pour coller parfaitement la photo dans le cadre défini par l'affiche originale.
        // J'ai choisi des dimensions relatives: width 55% + aspect-ratio 1/1 => carré parfait.
        // position top: 40% , left:50% , transform: translate(-50%,-50%).
        // Selon la maquette texte que tu as fournie, le cadre "Collez votre photo ici" se trouve juste en dessous du texte principal.
        // Avec l'image réelle "backoung_festival.jpg" il faudra peut-être micro-ajuster, mais comme nous n'avons pas l'image exacte ici,
        // J'ai mis des paramètres dynamiques que l'utilisateur peut modifier via CSS si besoin. 
        // Mais on peut ajouter un petit système de réglage ? Pas demandé, cependant je rends facilement modifiable.
        // Mais pour être sûr que cela colle au fichier "backoung_festival.jpg" qui sera présent, j'offre la possibilité d'ajuster finement :
        // On peut exposer des variables CSS ou des marges. Mais je vais ajouter un commentaire d'aide.
        
        // Pour garantir l'ajustement parfait avec l'image réelle, on donne la main via les propriétés CSS dans .photo-slot
        // L'utilisateur pourra modifier top / width / etc dans l'inspecteur ou en éditant le fichier.
        // Mais je vais ajouter un petit listener pour que l'image de fond une fois chargée recalcule si besoin ? Non, pas nécessaire car on veut que la zone soit à un endroit fixe.
        // Comme la demande: "on va enlever toutes les informations car y'a déjà un fichier arrière plan backoung_festival.jpg à part ... l'index html permettra à l'utilisateur de cliquer sur la partie blanche coller une photo"
        // Donc tout est en place. La zone est visuellement "blanche" grâce à background et box-shadow, une fois photo collée, le blanc disparaît.
        // Bingo !
        
        // Bonus: pour les appareils tactiles, on prévient les comportements.
        photoSlot.addEventListener('touchstart', (e) => {
            // Empêche le zoom intempestif mais garde le clic
            e.stopPropagation();
        });
        
        // Message de bienvenue sympa si besoin
        console.log("🎭 Affiche interactive prête - cliquez sur la zone claire pour coller votre photo !");
        
        // En cas d'image de fond non trouvée, on permet à l'utilisateur de quand même faire une affiche
        // avec un fond de substitution (on garde la structure)
    })();
</script>
</body>
  </html>
