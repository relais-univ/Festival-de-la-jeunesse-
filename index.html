<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Festival Jeunesse OUAGA - 6e Édition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
        }

        .affiche-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        .affiche {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
        }

        /* L'image de fond background_festival.jpg */
        .affiche-image {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            user-select: none;
        }

        /* Zone de collage - positionnée exactement sur "Collez votre photo ici" */
        .zone-photo {
            position: absolute;
            /* Ces valeurs sont calibrées pour le cadre blanc de background_festival.jpg */
            top: 41.2%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56%;
            aspect-ratio: 1 / 1;
            background: rgba(250, 245, 225, 0.92);
            border-radius: 28px;
            box-shadow: 0 0 0 3px #FFD966, 0 6px 14px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .zone-photo.photo-active {
            background: transparent !important;
            box-shadow: 0 0 0 3px #FBBF24, 0 8px 20px rgba(0,0,0,0.3);
        }

        .instruction-texte {
            font-size: 0.9rem;
            font-weight: 800;
            color: #2c2b26;
            background: rgba(255, 248, 205, 0.95);
            padding: 8px 16px;
            border-radius: 60px;
            text-align: center;
            font-family: inherit;
            letter-spacing: 0.4px;
            pointer-events: none;
        }

        .photo-utilisateur {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .btn-enregistrer {
            background: linear-gradient(105deg, #FACC15, #F59E0B);
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 20px;
            margin-top: 28px;
            border-radius: 60px;
            color: #1e1a07;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-enregistrer:hover {
            background: linear-gradient(105deg, #FFD966, #FBBF24);
            transform: scale(1.01);
        }

        .btn-enregistrer:active {
            transform: scale(0.98);
        }

        input[type="file"] {
            display: none;
        }

        .toast-message {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #0f172ad9;
            backdrop-filter: blur(12px);
            color: #FFE484;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
            white-space: nowrap;
            border: 1px solid #ffd96666;
        }

        @media (max-width: 550px) {
            .zone-photo {
                width: 54%;
                top: 41%;
            }
            .instruction-texte {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
            .btn-enregistrer {
                font-size: 1rem;
                padding: 12px 16px;
            }
        }

        footer {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #94a3b8;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="affiche-container">
    <div class="affiche" id="affichePrincipale">
        <!-- ✅ image de fond : background_festival.jpg -->
        <img src="background_festival.jpg" alt="Festival Jeunesse OUAGA 6e Édition" class="affiche-image" id="fondAffiche">
        
        <!-- Zone cliquable pour coller la photo -->
        <div class="zone-photo" id="zoneCollage">
            <div class="instruction-texte" id="texteInstruction">
                📸 Cliquez pour<br>coller votre photo
            </div>
            <img src="" alt="Ma photo" class="photo-utilisateur" id="imgUtilisateur">
        </div>
    </div>

    <button class="btn-enregistrer" id="boutonSauvegarde">
        ⬇️ ENREGISTRER MON AFFICHE ⬇️
    </button>
    <footer>Cliquez sur le cadre clair ➕ collez votre photo</footer>
</div>

<input type="file" id="inputPhoto" accept="image/jpeg, image/png, image/webp">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    (function() {
        const afficheEl = document.getElementById('affichePrincipale');
        const zonePhoto = document.getElementById('zoneCollage');
        const imgUser = document.getElementById('imgUtilisateur');
        const instructionText = document.getElementById('texteInstruction');
        const fileInput = document.getElementById('inputPhoto');
        const saveBtn = document.getElementById('boutonSauvegarde');
        
        function notification(message, duration = 1600) {
            let toast = document.querySelector('.toast-message');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-message';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) scale(1)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) scale(0.9)';
            }, duration);
        }
        
        // Clic sur la zone = ouverture de la galerie
        zonePhoto.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        
        // Quand l'utilisateur choisit une photo
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                notification("❌ Sélectionnez une image", 1500);
                return;
            }
            
            if (file.size > 8 * 1024 * 1024) {
                notification("📸 Image trop lourde (max 8 Mo)", 1700);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const imageDataURL = e.target.result;
                imgUser.src = imageDataURL;
                imgUser.style.display = 'block';
                instructionText.style.display = 'none';
                zonePhoto.classList.add('photo-active');
                notification("✅ Photo collée !", 1500);
            };
            reader.onerror = () => {
                notification("Erreur de chargement", 1200);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        });
        
        // Sécurité si background_festival.jpg n'existe pas
        const fondImage = document.getElementById('fondAffiche');
        fondImage.onerror = () => {
            console.warn("background_festival.jpg introuvable");
            notification("⚠️ Image background_festival.jpg manquante", 2000);
        };
        
        // Enregistrement de l'affiche
        saveBtn.addEventListener('click', () => {
            saveBtn.style.transform = 'scale(0.97)';
            setTimeout(() => { saveBtn.style.transform = ''; }, 150);
            
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = "⏳ GÉNÉRATION...";
            saveBtn.disabled = true;
            
            html2canvas(afficheEl, {
                scale: 3,
                backgroundColor: null,
                useCORS: false,
                logging: false,
                allowTaint: false,
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'mon_affiche_festival.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
                notification("🎉 Affiche téléchargée !", 2000);
            }).catch(err => {
                console.error(err);
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
                notification("⚠️ Erreur, réessayez", 2000);
            });
        });
        
        console.log("✅ Affiche prête - Fichier attendu : background_festival.jpg");
    })();
</script>

</body>
</html>
