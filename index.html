<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Affiche Officiel</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; background-color: #000;
        }

        /* L'AFFICHE : C'est le seul élément visible */
        .poster-container {
            width: 375px; 
            height: 667px; 
            position: relative;
            background-image: url('votre_affiche_fond.jpg'); /* TON IMAGE ICI */
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ZONE PHOTO INVISIBLE : Placée pile sur le carré blanc du design */
        .photo-zone {
            position: absolute;
            top: 418px; /* Position ajustée pour le carré blanc */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 155px;  /* Largeur du carré blanc */
            height: 155px; /* Hauteur du carré blanc */
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .photo-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* BOUTON D'ENREGISTREMENT EN DESSOUS */
        #btnSave {
            margin-top: 20px;
            background-color: #2e7d32;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="poster-container" id="poster">
        <div class="photo-zone" id="photoZone">
            <img src="" id="userPhoto">
        </div>
    </div>

    <button id="btnSave">Enregistrer mon affiche</button>

    <input type="file" id="photoInput" accept="image/*" style="display: none;">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const photoZone = document.getElementById('photoZone');
        const photoInput = document.getElementById('photoInput');
        const userPhoto = document.getElementById('userPhoto');
        const btnSave = document.getElementById('btnSave');

        // Au clic sur la zone du cadre doré
        photoZone.addEventListener('click', () => photoInput.click());

        // Affichage de la photo
        photoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    userPhoto.src = e.target.result;
                    userPhoto.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Capture finale
        btnSave.addEventListener('click', () => {
            html2canvas(document.getElementById('poster'), { 
                scale: 3, 
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/png");
                link.download = 'mon_affiche_festival.png';
                link.click();
            });
        });
    </script>
</body>
</html>
